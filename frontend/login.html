<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Pós Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo-container">
                <img src="logo.png" alt="Logo da Empresa" class="logo" id="logoEmpresa" onerror="this.style.display='none'">
            </div>
            <h1>Sistema Pós Vendas</h1>
            
            <div id="statusOffline" class="mensagem-info" style="display: none; background-color: #fef3c7; color: #92400e; border: 1px solid #f6c23e; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; font-size: 14px;">
                📱 Modo Offline - Login com dados salvos
            </div>
            
            <div id="mensagemErro" class="mensagem-erro" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Usuário:</label>
                    <input type="text" id="username" required placeholder="Digite seu usuário" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Senha:</label>
                    <input type="password" id="password" required placeholder="Digite sua senha">
                </div>
                
                <div class="input-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="manterConectado"> 
                        <span>Manter-me conectado</span>
                    </label>
                </div>
                
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://sistema-pos-vendas-backend.onrender.com';
        
        // USUÁRIOS OFFLINE (salvos localmente)
        const USUARIOS_OFFLINE_KEY = 'usuarios_offline';
        
        // Usuários padrão (primeira vez)
        const USUARIOS_PADRAO = {
            'admin': { senha: 'admin123', role: 'admin', nome: 'Administrador' },
            'henrique': { senha: '30072021', role: 'admin', nome: 'Henrique Master' },
            'andressa': { senha: '123', role: 'pos', nome: 'Andressa' }
        };

        // ========== FUNÇÕES OFFLINE ==========
        
        function carregarUsuariosOffline() {
            try {
                const saved = localStorage.getItem(USUARIOS_OFFLINE_KEY);
                if (saved) {
                    const usuarios = JSON.parse(saved);
                    // Mesclar com os padrão
                    return { ...USUARIOS_PADRAO, ...usuarios };
                }
            } catch (e) {
                console.error('Erro ao carregar usuários offline:', e);
            }
            return USUARIOS_PADRAO;
        }

        function salvarUsuarioOffline(username, senha, role, nome) {
            try {
                const usuarios = carregarUsuariosOffline();
                usuarios[username] = { senha, role, nome };
                localStorage.setItem(USUARIOS_OFFLINE_KEY, JSON.stringify(usuarios));
                console.log('✅ Usuário salvo offline:', username);
            } catch (e) {
                console.error('Erro ao salvar usuário offline:', e);
            }
        }

        function sincronizarUsuariosOffline() {
            // Busca usuários do servidor e salva localmente
            fetch(`${API_URL}/buscar-usuarios`)
                .then(res => res.json())
                .then(usuarios => {
                    const offline = carregarUsuariosOffline();
                    usuarios.forEach(u => {
                        offline[u.usuario] = { 
                            senha: u.senha, 
                            role: u.tipo, 
                            nome: u.nome 
                        };
                    });
                    localStorage.setItem(USUARIOS_OFFLINE_KEY, JSON.stringify(offline));
                    console.log('✅ Usuários sincronizados offline');
                })
                .catch(err => console.log('⚠️ Não foi possível sincronizar usuários (modo offline)'));
        }

        // ========== FUNÇÕES DE LOGIN ==========
        
        function mostrarErro(mensagem) {
            const erroDiv = document.getElementById('mensagemErro');
            erroDiv.textContent = mensagem;
            erroDiv.style.display = 'block';
            setTimeout(() => {
                erroDiv.style.display = 'none';
            }, 5000);
        }

        function esconderErro() {
            document.getElementById('mensagemErro').style.display = 'none';
        }

        // ========== LOGIN OFFLINE ==========
        function loginOffline(username, password) {
            const usuarios = carregarUsuariosOffline();
            const user = usuarios[username];
            
            if (user && user.senha === password) {
                return { success: true, role: user.role, nome: user.nome };
            }
            return { success: false };
        }

        // ========== EVENTOS ==========
        
        window.addEventListener('DOMContentLoaded', function() {
            // Verifica se está offline
            if (!navigator.onLine) {
                document.getElementById('statusOffline').style.display = 'block';
                mostrarErro('📱 Modo Offline - Usando credenciais salvas localmente');
            }
            
            // Tenta sincronizar usuários (se tiver internet)
            if (navigator.onLine) {
                sincronizarUsuariosOffline();
            }
            
            // Carregar login salvo
            const manterConectado = localStorage.getItem('manterConectado') === 'true';
            const loginSalvo = localStorage.getItem('loginSalvo');
            const senhaSalva = localStorage.getItem('senhaSalva');
            
            if (manterConectado && loginSalvo && senhaSalva) {
                document.getElementById('username').value = loginSalvo;
                document.getElementById('password').value = senhaSalva;
                document.getElementById('manterConectado').checked = true;
                
                // Tenta login automático (offline ou online)
                fazerLogin(loginSalvo, senhaSalva);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            esconderErro();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const manterConectado = document.getElementById('manterConectado').checked;
            
            const submitButton = e.target.querySelector('button[type="submit"]');
            const textoOriginal = submitButton.textContent;
            submitButton.textContent = '⏳ Entrando...';
            submitButton.disabled = true;
            
            // Tenta fazer login
            const resultado = await fazerLogin(username, password);
            
            if (resultado.success) {
                if (manterConectado) {
                    localStorage.setItem('loginSalvo', username);
                    localStorage.setItem('senhaSalva', password);
                    localStorage.setItem('manterConectado', 'true');
                } else {
                    localStorage.removeItem('loginSalvo');
                    localStorage.removeItem('senhaSalva');
                    localStorage.removeItem('manterConectado');
                }
                
                localStorage.setItem('userRole', resultado.role);
                localStorage.setItem('userName', resultado.nome);
                localStorage.setItem('usuarioLogado', username);
                localStorage.setItem('sessaoAtiva', 'true');
                localStorage.setItem('ultimoAcesso', new Date().getTime());
                
                // Salva usuário offline para próximos logins
                salvarUsuarioOffline(username, password, resultado.role, resultado.nome);
                
                if (resultado.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'posvenda.html';
                }
            } else {
                mostrarErro('❌ Usuário ou senha inválidos. Verifique e tente novamente.');
                submitButton.textContent = textoOriginal;
                submitButton.disabled = false;
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });

        // ========== FUNÇÃO DE LOGIN (ONLINE + OFFLINE) ==========
        async function fazerLogin(username, password) {
            // Primeiro: tenta login online
            if (navigator.onLine) {
                try {
                    const response = await fetch(`${API_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        // Sincroniza usuários após login bem sucedido
                        sincronizarUsuariosOffline();
                        return { success: true, role: data.role, nome: data.nome };
                    }
                } catch (error) {
                    console.log('⚠️ Erro no login online, tentando offline:', error);
                }
            }
            
            // Segundo: tenta login offline (se online falhou ou está offline)
            const offlineResult = loginOffline(username, password);
            if (offlineResult.success) {
                console.log('✅ Login offline bem sucedido');
                return offlineResult;
            }
            
            return { success: false };
        }

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('✅ Service Worker registrado!'))
                .catch(err => console.log('❌ Service Worker erro:', err));
        }
    </script>
</body>
</html>
