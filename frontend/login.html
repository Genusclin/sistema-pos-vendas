<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Pós Vendas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo-container">
                <img src="logo.png" alt="Logo da Empresa" class="logo" id="logoEmpresa" onerror="this.style.display='none'">
            </div>
            <h1>Sistema Pós Vendas</h1>
            
            <div id="mensagemErro" class="mensagem-erro" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Usuário:</label>
                    <input type="text" id="username" required placeholder="Digite seu usuário" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Senha:</label>
                    <input type="password" id="password" required placeholder="Digite sua senha">
                </div>
                
                <div class="input-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="manterConectado"> 
                        <span>Manter-me conectado</span>
                    </label>
                </div>
                
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://sistema-pos-vendas-backend.onrender.com';

        function mostrarErro(mensagem) {
            const erroDiv = document.getElementById('mensagemErro');
            erroDiv.textContent = mensagem;
            erroDiv.style.display = 'block';
            setTimeout(() => {
                erroDiv.style.display = 'none';
            }, 5000);
        }

        function esconderErro() {
            const erroDiv = document.getElementById('mensagemErro');
            erroDiv.style.display = 'none';
        }

        async function fazerLoginAutomatico(username, password) {
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('userName', data.nome);
                    localStorage.setItem('usuarioLogado', username);
                    localStorage.setItem('sessaoAtiva', 'true');
                    localStorage.setItem('ultimoAcesso', new Date().getTime());
                    
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'posvenda.html';
                    }
                } else {
                    localStorage.removeItem('loginSalvo');
                    localStorage.removeItem('senhaSalva');
                    localStorage.removeItem('manterConectado');
                    localStorage.removeItem('sessaoAtiva');
                }
            } catch (error) {
                console.error('Erro no login automático:', error);
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const manterConectado = localStorage.getItem('manterConectado') === 'true';
            const loginSalvo = localStorage.getItem('loginSalvo');
            const senhaSalva = localStorage.getItem('senhaSalva');
            const sessaoAtiva = localStorage.getItem('sessaoAtiva') === 'true';
            const ultimoAcesso = localStorage.getItem('ultimoAcesso');
            
            const diasExpiracao = 7;
            const agora = new Date().getTime();
            const expirado = ultimoAcesso && (agora - parseInt(ultimoAcesso)) > (diasExpiracao * 24 * 60 * 60 * 1000);
            
            if (manterConectado && sessaoAtiva && !expirado && loginSalvo && senhaSalva) {
                const submitButton = document.querySelector('button[type="submit"]');
                if (submitButton) {
                    submitButton.textContent = '⏳ Entrando automaticamente...';
                    submitButton.disabled = true;
                }
                await fazerLoginAutomatico(loginSalvo, senhaSalva);
            } 
            else if (manterConectado && loginSalvo && senhaSalva) {
                document.getElementById('username').value = loginSalvo;
                document.getElementById('password').value = senhaSalva;
                document.getElementById('manterConectado').checked = true;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            esconderErro();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const manterConectado = document.getElementById('manterConectado').checked;
            
            const submitButton = e.target.querySelector('button[type="submit"]');
            const textoOriginal = submitButton.textContent;
            submitButton.textContent = '⏳ Entrando...';
            submitButton.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    if (manterConectado) {
                        localStorage.setItem('loginSalvo', username);
                        localStorage.setItem('senhaSalva', password);
                        localStorage.setItem('manterConectado', 'true');
                    } else {
                        localStorage.removeItem('loginSalvo');
                        localStorage.removeItem('senhaSalva');
                        localStorage.removeItem('manterConectado');
                    }
                    
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('userName', data.nome);
                    localStorage.setItem('usuarioLogado', username);
                    localStorage.setItem('sessaoAtiva', 'true');
                    localStorage.setItem('ultimoAcesso', new Date().getTime());
                    
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'posvenda.html';
                    }
                } else {
                    mostrarErro('❌ Não foi possível realizar o login. Verifique seu usuário e senha e tente novamente.');
                    submitButton.textContent = textoOriginal;
                    submitButton.disabled = false;
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Erro:', error);
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    mostrarErro('🔌 Erro de conexão com o servidor. Verifique se o servidor está rodando.');
                } else {
                    mostrarErro('⚠️ Ocorreu um erro inesperado. Tente novamente mais tarde.');
                }
                submitButton.textContent = textoOriginal;
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
